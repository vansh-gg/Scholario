<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Notifications — Scholario</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <div class="main">
    <div class="topbar">
      <div><div class="topbar-title">Notifications</div><div class="topbar-sub">All alerts and updates</div></div>
      <div class="topbar-right">
        <button class="btn btn-secondary btn-sm" onclick="markAll()">Mark all read</button>
      </div>
    </div>
    <div class="page-content fade-in" id="main-content">
      <div class="loading"><div class="spinner"></div> Loading...</div>
    </div>
  </div>
</div>
<script src="shared.js"></script>
<script>
const user=getUser();
buildSidebar('student','Notifications');

async function load(){
  try{const d=await apiFetch(`/notifications/${user.user_id}`);render(d);}
  catch(e){document.getElementById('main-content').innerHTML=`<div class="alert alert-danger">${e.message}</div>`;}
}

function render(list){
  if(!list.length){document.getElementById('main-content').innerHTML=`<div class="card"><div class="empty-state"><div class="empty-icon">🔔</div><h3>All clear</h3><p style="font-size:12px;color:var(--text3)">No notifications yet.</p></div></div>`;return;}
  const typeColor={info:'var(--accent)',warning:'var(--yellow)',success:'var(--green)',urgent:'var(--red)'};
  document.getElementById('main-content').innerHTML=`
    <div class="card">
      ${list.map(n=>`
        <div class="notif-item ${!n.is_read?'unread':''}" id="notif-${n.notif_id}">
          <div class="notif-dot-type" style="background:${typeColor[n.type]||'var(--text3)'}"></div>
          <div style="flex:1">
            <div class="notif-title">${n.title}</div>
            <div class="notif-msg">${n.message||''}</div>
            <div class="notif-time">${timeAgo(n.created_at)} · ${formatDateTime(n.created_at)}</div>
          </div>
          ${statusBadge(n.type)}
          ${!n.is_read?`<button class="btn btn-secondary btn-sm" onclick="markRead(${n.notif_id})">✓</button>`:''}
        </div>
      `).join('')}
    </div>
  `;
}

async function markRead(id){
  await apiFetch(`/notifications/${id}/read`,{method:'PUT'});
  document.getElementById(`notif-${id}`)?.classList.remove('unread');
}

async function markAll(){
  await apiFetch(`/notifications/${user.user_id}/read-all`,{method:'PUT'});
  document.querySelectorAll('.notif-item.unread').forEach(el=>el.classList.remove('unread'));
  document.querySelectorAll('[onclick^="markRead"]').forEach(el=>el.remove());
  showToast('All notifications marked as read');
}
load();
</script>
</body>
</html>
